<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- daisyUi + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- daisyUI theme cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />


    <!-- custom css  -->
    <link rel="stylesheet" href="./styles/style.css">

    <!-- icon  -->
    <link rel="shortcut icon" href="./assets/Aperture.png" type="image/x-icon">


    <title>Issueforge Dashboard</title>



</head>

<body>

    <!-- header area start -->

    <header class="z-50 sticky top-0">

        <nav class="border-b border-gray-300">
            <div class="nav-container flex justify-between items-center py-4 ">

                <div class="nav-logo flex gap-3 items-center ">

                    <img class="h-[36px] w-[36px] " src="./assets/github-logo.png" alt="">

                    <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>

                </div>

                <div class="flex gap-3">
                    <label class="input outline-none">
                        <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input id="search-issue" type="search" placeholder="Search issues..." />
                    </label>

                    <button id="search-issue-btn" class="btn btn-active btn-primary text-[14px]">+ New Issue</button>
                </div>


            </div>
        </nav>

    </header>



    <!-- main area start -->
    <main>
        <!-- filter all button section -->
        <!-- total all button section  -->
        <section class=" pt-[clamp(2rem,5vw,3.75rem)] mb-4">
            <div class="my-container flex gap-4 p-6 bg-white shadow-sm">

                <div>
                    <button onclick="showFilterIssueBtn('all-btn'); filterIssues('all')" id="all-btn"
                        class="btn  text-[14px] px-11 ">All</button>

                </div>

                <div>
                    <button onclick="showFilterIssueBtn('open-btn'); filterIssues('open')" id="open-btn"
                        class="btn text-[14px] px-10">Open</button>
                </div>

                <div>

                    <button onclick="showFilterIssueBtn('close-btn'); filterIssues('closed')" id="close-btn"
                        class="btn text-[14px] px-9 ">Closed</button>

                </div>

            </div>

        </section>


        <!-- issue section and  all card section -->
        <section>

            <!-- issue  count section  -->
            <div class="my-container border-b shadow-sm border-gray-200">

                <div class=" flex items-center justify-between py-4">
                    <div class="flex gap-3 items-center">
                        <div class="w-[50px] h-[50px] rounded-full bg-[#ece4ff] flex justify-center items-center">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h2 class="text-xl font-semibold">
                                <span id="issue-count" class="inline-block">0</span> Issues
                            </h2>
                            <p class="text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>

                    <!-- open closed section -->
                    <div class="flex gap-3 items-center">
                        <p class="font-semibold"><span
                                class="w-[12px] h-[12px] rounded-full bg-green-500 inline-block"></span> Open</p>
                        <p class="font-semibold"><span
                                class="w-[12px] h-[12px] rounded-full bg-[#a855f7] inline-block"></span> Closed</p>
                    </div>

                </div>

            </div>


            <!-- all card container -->
            <div class=" my-container bg-white shadow-sm justify-between ">

                <!-- all card section parent -->
                <div id="issue-all-card"
                    class="py-7 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-3 items-stretch hidden">

                    <!-- all card akhane asche loop diye toiri hoye -->

                </div>

                <div id="spinner-container" class=" flex justify-center items-center py-30">
                    <span class="loading loading-bars loading-md"></span>
                    <span class="loading loading-bars loading-lg"></span>
                    <span class="loading loading-bars loading-xl"></span>
                </div>


            </div>



        </section>



    </main>


    <script src="./javaScript/script.js"></script>
</body>

</html>
